quarkus.http.port=8080

# ── Application name (shows in health + metrics) ──────────────────────────────
quarkus.application.name=high-perf-kube-java
quarkus.application.version=1.0.0-SNAPSHOT

# ── Micrometer / Prometheus ────────────────────────────────────────────────────
# Expose the Prometheus scrape endpoint at /q/metrics
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Tag every metric with the runtime type so JVM vs native comparisons are easy
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.binder.http-server.enabled=true

# ── Health ─────────────────────────────────────────────────────────────────────
# Health UI is enabled by default in dev mode via Dev UI

# ── Container image ────────────────────────────────────────────────────────────
# quarkus.container-image.build=true
# quarkus.container-image.registry=quay.io
# quarkus.container-image.group=danieloh30
# quarkus.container-image.name=high-perf-java
# quarkus.container-image.tag=1.0
# quarkus.container-image.push=true

# ── Dev mode ──────────────────────────────────────────────────────────────────
%dev.quarkus.log.level=INFO
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
